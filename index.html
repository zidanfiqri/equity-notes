<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equity Notes | Corporate Actions Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">📊 Equity Notes</a>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row mb-3">
            <div class="col-md-4">
                <input type="text" id="searchInput" class="form-control" placeholder="Cari Ticker (Misal: BBRI, GOTO, RAJA...)">
            </div>
        </div>

        <ul class="nav nav-tabs" id="dashboardTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active fw-bold" id="ri-tab" data-bs-toggle="tab" data-bs-target="#ri" type="button" role="tab">Right Issue / HMETD</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link fw-bold" id="tender-tab" data-bs-toggle="tab" data-bs-target="#tender" type="button" role="tab">Tender Offer</button>
            </li>
        </ul>

        <div class="tab-content bg-white p-4 border border-top-0 rounded-bottom shadow-sm" id="dashboardTabsContent">
            <div class="tab-pane fade show active" id="ri" role="tabpanel">
                <div class="table-responsive">
                    <table class="table table-hover table-bordered" id="riTable">
                        <thead class="table-dark">
                            <tr id="riHeaders"></tr>
                        </thead>
                        <tbody id="riBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="tab-pane fade" id="tender" role="tabpanel">
                <div class="table-responsive">
                    <table class="table table-hover table-bordered" id="tenderTable">
                        <thead class="table-dark">
                            <tr id="tenderHeaders"></tr>
                        </thead>
                        <tbody id="tenderBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
